services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-resume-match-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resume_match}
      POSTGRES_USER: ${POSTGRES_USER:-resume_match}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resume_match}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resume_match} -d ${POSTGRES_DB:-resume_match}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai-resume-match-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://resume_match:resume_match@postgres:5432/resume_match}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      RESUME_STORAGE_DIR: ${RESUME_STORAGE_DIR:-app/storage/resumes}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: ai-resume-match-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_started
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
